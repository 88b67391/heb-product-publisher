name: Release Plugin ZIP

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify plugin version matches tag
        run: |
          HEADER_VERSION=$(grep -E '^[[:space:]]*\*[[:space:]]*Version:' heb-product-publisher.php | head -n1 | sed -E 's/.*Version:[[:space:]]*//; s/[[:space:]]+$//')
          CONST_VERSION=$(grep -E "define\(\s*'HEB_PP_VERSION'" heb-product-publisher.php | head -n1 | sed -E "s/.*'HEB_PP_VERSION'[^']*'([^']+)'.*/\1/")
          echo "tag=${{ steps.ver.outputs.version }} header=$HEADER_VERSION const=$CONST_VERSION"
          if [ "$HEADER_VERSION" != "${{ steps.ver.outputs.version }}" ] || [ "$CONST_VERSION" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Plugin version mismatch. Please align header Version, HEB_PP_VERSION and git tag."
            exit 1
          fi

      - name: Build zip
        run: |
          mkdir -p build/heb-product-publisher
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='.idea' \
            --exclude='.vscode' \
            ./ build/heb-product-publisher/
          cd build && zip -r ../heb-product-publisher.zip heb-product-publisher

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: heb-product-publisher.zip
